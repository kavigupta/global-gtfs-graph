syntax = "proto3";

message Stop {
  int32 stop_id = 1;        // normalized per FeedGraph (0 .. N-1)
  string name = 2;
  double lat = 3;
  double lon = 4;
}

message Line {
  int32 line_id = 1;        // normalized per FeedGraph (0 .. N-1)
  string name = 2;
  string color = 3;
  int32 type_id = 4;
  string agency_id = 5;  // GTFS agency that operates this route
}

message Timing {
  // Minutes from beginning of the UTC day [0, 1439].
  int32 start_min = 1;
  // Duration in minutes (end_min - start_min), wrapped if needed.
  int32 duration = 2;
}

message Journey {
  int32 line_id = 1;
  // Normalized stop IDs (0..N-1 within this FeedGraph)
  int32 start_stop_id = 4;
  int32 end_stop_id = 5;
  // Python weekday in UTC: Monday=0, ..., Sunday=6.
  repeated int32 days = 6;
  // Departure patterns (times within the UTC day + duration).
  repeated Timing timings = 7;
}

message Edge {
  int32 start_stop_id = 1;
  int32 end_stop_id = 2;
  int32 line_id = 3;
  float mean_duration_minutes = 4;
}

message FeedGraph {
  repeated Stop stops = 1;
  repeated Line lines = 2;
  repeated Journey journeys = 3;
  repeated Edge edges = 4;
}
