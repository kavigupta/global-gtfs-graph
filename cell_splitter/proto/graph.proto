syntax = "proto3";

package graph;

message Stop {
  int32 stop_id = 1;        // normalized per FeedGraph (0 .. N-1)
  string name = 2;
  double lat = 3;
  double lon = 4;
  // Minutes of travel time used from the cell seeds to reach this stop
  // in the Dijkstra search. 0 for seed stops inside the cell, >0 for
  // stops reached outside the cell, always < MAX_TRAVEL_MINUTES.
  optional int32 minutes_used = 5;
}

message Line {
  int32 line_id = 1;        // normalized per FeedGraph (0 .. N-1)
  string name = 2;
  string color = 3;
  int32 type_id = 4;
  string agency_id = 5;  // GTFS agency that operates this route
}

// Full journey: ordered sequence of stops with times at each stop.
message Journey {
  int32 line_id = 1;
  // Ordered stop IDs (0..N-1 within this FeedGraph); length >= 2.
  repeated int32 stops = 2;
  // Minutes from local midnight at each stop; same length as stops.
  repeated int32 times_within_day = 3;
  // Weekdays this pattern runs: 0=Monday .. 6=Sunday.
  repeated int32 days = 4;
}

message Edge {
  int32 start_stop_id = 1;
  int32 end_stop_id = 2;
  int32 line_id = 3;
  float mean_duration_minutes = 4;
}

message FeedGraph {
  repeated Stop stops = 1;
  repeated Line lines = 2;
  repeated Journey journeys = 3;
  repeated Edge edges = 4;
}
